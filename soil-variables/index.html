<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soil Variables Explained | NAITRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="../assets/css/soil-variables.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="../">
    <div class="nav-logo">N</div>
    <span class="nav-name">NAITRO</span>
  </a>
  <a class="nav-back" href="../how-naitro-works/"><i class="ti ti-arrow-left"></i> How NAITRO works</a>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1>What's actually in the soil —<br><strong>and what Optimal, Average and Poor look like.</strong></h1>
    <p class="hero-sub">Ten of the Forty-one variables from the Soil Health Platform data model, each shown as a visual state at three thresholds.</p>
  </div>
</div>

<div class="toc-strip">
  <div class="toc-inner" id="toc-inner"></div>
</div>

<div class="main" id="variables-root"></div>

<script src="../assets/data/soil-variables.js"></script>
<script src="../assets/js/variable-cms.js"></script>
<script>
(function () {
  const TARGET_IDS = [
    'microbial-biomass-carbon', 'macroporosity', 'fungal-bacterial-ratio',
    'earthworm-count', 'rhizobia-activity', 'total-nitrogen',
    'plant-available-nitrogen', 'total-phosphorus', 'olsen-p', 'potassium',
  ];

  const SECTIONS = ['Soil Biology', 'Macro Nutrients'];
  const STATE_LABEL = { high: 'Optimal', medium: 'Average', low: 'Poor' };

  function joinUnit(unit) {
    if (!unit) return '';
    return unit.charAt(0).toLowerCase() + unit.slice(1);
  }

  function cubePlaceholderSvg() {
    return `<svg class="hml-cube-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,5 92,28 92,72 50,95 8,72 8,28" fill="none" stroke="white" stroke-width="2.5"/>
      <polygon points="50,5 92,28 50,51 8,28" fill="none" stroke="white" stroke-width="2.5"/>
      <line x1="50" y1="51" x2="50" y2="95" stroke="white" stroke-width="2.5"/>
    </svg>`;
  }

  function hmlCard(state, data) {
    const cls = state; // 'high' | 'medium' | 'low' — internal key, label is shown via STATE_LABEL
    const visualInner = data.imageUrl
      ? `<img src="${data.imageUrl}" alt="${data.visual}">`
      : `<div class="hml-placeholder ${cls}">
           ${cubePlaceholderSvg()}
           <span class="hml-placeholder-text">Image pending</span>
         </div>`;
    return `
      <div class="hml-card">
        <div class="hml-head ${cls}">
          <span class="hml-state">${STATE_LABEL[state]}</span>
          <span class="hml-label">${data.label}</span>
        </div>
        <div class="hml-visual">
          ${visualInner}
          ${!data.imageUrl ? '<span class="pending-badge">Awaiting Airtable</span>' : ''}
        </div>
        <div class="hml-caption">
          <div class="hml-caption-text">${data.visual}</div>
        </div>
      </div>`;
  }

  function renderVariable(v) {
    return `
      <div class="var-block" id="${v.id}">
        <h1 class="var-title">${v.name}</h1>
        <p class="var-desc">${v.description} measured in ${joinUnit(v.unit)}.</p>
        <div class="var-note"><i class="ti ti-leaf"></i><span>${v.nzNote}</span></div>
        <div class="threshold-row">
          <span class="threshold-chip"><span class="threshold-dot" style="background:#1D9E75"></span>Optimal–Average threshold: <strong>${v.thresholds.highMedium}</strong></span>
          <span class="threshold-chip"><span class="threshold-dot" style="background:#E07B18"></span>Average–Poor threshold: <strong>${v.thresholds.mediumLow}</strong></span>
        </div>
        <div class="hml-grid">
          ${hmlCard('high', v.states.high)}
          ${hmlCard('medium', v.states.medium)}
          ${hmlCard('low', v.states.low)}
        </div>
      </div>`;
  }

  function renderSection(category, vars) {
    const varsInSection = vars.filter(v => v.category === category);
    if (!varsInSection.length) return '';
    return `
      <section class="category-section" id="section-${category.toLowerCase().replace(/\s+/g, '-')}">
        <div class="category-header">
          <div class="category-num">${category === 'Soil Biology' ? '01' : '02'}</div>
          <h2 class="category-title">${category}</h2>
        </div>
        ${varsInSection.map(renderVariable).join('')}
      </section>`;
  }

  function renderToc(vars) {
    document.getElementById('toc-inner').innerHTML = vars.map(v =>
      `<a class="toc-step" href="#${v.id}">${v.name}</a>`
    ).join('');
  }

  function renderAll(vars) {
    document.getElementById('variables-root').innerHTML = SECTIONS.map(cat => renderSection(cat, vars)).join('');
    renderToc(vars);
  }

  const localVars = VariableCMS.getVariables(window.NAITRO_SOIL_VARIABLES, TARGET_IDS, (mergedVars) => {
    renderAll(mergedVars);
  });

  renderAll(localVars);
})();
</script>

</body>
</html>
